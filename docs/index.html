<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Electronic Components — Search</title>
  <meta name="description" content="Search electronic components, parts and modules from global manufacturers" />
  <link rel="stylesheet" href="./css/site.css" />
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <div class="brand">
        <div class="logo">W</div>
        <div>
          <h1 id="brand-title">World Electronic Components</h1>
          <p id="brand-sub">Open component search</p>
        </div>
      </div>
      <nav class="links">
        <a id="nav-search" class="active" href="./">Search</a>
        <a id="nav-docs" href="./zh/">Docs</a>
        <div class="lang-toggle" aria-label="Language">
          <button type="button" data-lang-btn="zh">中文</button>
          <button type="button" data-lang-btn="en">EN</button>
        </div>
      </nav>
    </header>

    <section class="hero">
      <h2 id="hero-title">Search</h2>
      <div class="search-box">
        <input id="q" type="search" autocomplete="off" placeholder="Search…" />
        <button class="btn primary" id="btn-search" type="button">Search</button>
      </div>
      <div class="filters">
        <select id="f-cat" aria-label="Category"></select>
        <select id="f-class" aria-label="Class"></select>
        <select id="f-mfr" aria-label="Manufacturer"></select>
      </div>
      <div class="meta" id="meta">…</div>
    </section>

    <section class="results" id="results"></section>

    <footer id="footer-text">
      World Electronic Components · Open data for engineers
    </footer>
  </div>
  <script src="./js/search.js"></script>
</body>
</html>
