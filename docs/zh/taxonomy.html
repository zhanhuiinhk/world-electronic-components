<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>产品分类 · 说明</title>
  <link rel="stylesheet" href="../css/site.css" />
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <div class="brand"><div class="logo">类</div><div><h1>产品分类</h1><p>参考主流分销类目整理</p></div></div>
      <nav class="links"><a href="../">检索</a><a href="./">说明首页</a><a href="../en/taxonomy.html">EN</a></nav>
    </header>
    <article class="doc">
      <h1>分类概览</h1>
      <p>分类对齐 DigiKey、Mouser、Arrow 等常见产品树，便于工程师按习惯浏览。</p>
      <p id="live">正在加载…</p>
      <div id="tree"></div>
    </article>
  </div>
  <script>
    async function loadTax() {
      const urls = [
        "../assets/taxonomy.json",
        "https://raw.githubusercontent.com/zhanhuiinhk/world-electronic-components/main/taxonomy/categories.json"
      ];
      for (const u of urls) {
        try { const r = await fetch(u); if (r.ok) return await r.json(); } catch (e) {}
      }
      return null;
    }
    loadTax().then(tax => {
      if (!tax) { document.getElementById("live").textContent = "分类信息暂时不可用"; return; }
      document.getElementById("live").textContent =
        "共 " + (tax.categories || []).length + " 个一级分类";
      document.getElementById("tree").innerHTML = (tax.categories || []).map(c =>
        `<h2>${c.name_zh || c.name_en}</h2><ul>` +
        (c.children || []).map(ch => `<li>${ch.name_zh || ch.name_en}</li>`).join("") +
        `</ul>`
      ).join("");
    });
  </script>
</body>
</html>
