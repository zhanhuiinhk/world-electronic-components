      <h1>新厂家入驻通道</h1>
      <ol>
        <li>Fork 仓库</li>
        <li>复制 <code>manufacturers/_template.json</code> → <code>manufacturers/{id}.json</code></li>
        <li>在 <code>data/{category_slug}/{id}.json</code> 提交产品（或用 CSV 导入生成）</li>
        <li>运行 <code>validate.py</code> 后开 Pull Request</li>
      </ol>
      <p>完整说明：仓库 <code>docs/MANUFACTURER_ONBOARDING.md</code>。批量协助可开 Issue（Manufacturer onboarding 模板）。</p>
