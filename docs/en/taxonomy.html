<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Categories · About</title>
  <link rel="stylesheet" href="../css/site.css" />
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <div class="brand"><div class="logo">Cat</div><div><h1>Categories</h1><p>Aligned with major distributor trees</p></div></div>
      <nav class="links"><a href="../">Search</a><a href="./">About</a><a href="../zh/taxonomy.html">中文</a></nav>
    </header>
    <article class="doc">
      <h1>Category overview</h1>
      <p>Merged from common DigiKey / Mouser / Arrow style top-level groups.</p>
      <p id="live">Loading…</p>
      <div id="tree"></div>
    </article>
  </div>
  <script>
    async function loadTax() {
      const urls = [
        "../assets/taxonomy.json",
        "https://raw.githubusercontent.com/zhanhuiinhk/world-electronic-components/main/taxonomy/categories.json"
      ];
      for (const u of urls) {
        try { const r = await fetch(u); if (r.ok) return await r.json(); } catch (e) {}
      }
      return null;
    }
    loadTax().then(tax => {
      if (!tax) { document.getElementById("live").textContent = "Unavailable"; return; }
      document.getElementById("live").textContent =
        (tax.categories || []).length + " top-level categories";
      document.getElementById("tree").innerHTML = (tax.categories || []).map(c =>
        `<h2>${c.name_en}</h2><ul>` +
        (c.children || []).map(ch => `<li>${ch.name_en}</li>`).join("") +
        `</ul>`
      ).join("");
    });
  </script>
</body>
</html>
