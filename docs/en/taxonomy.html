<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taxonomy · Docs</title>
  <link rel="stylesheet" href="../css/site.css" />
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <div class="brand"><div class="logo">Tax</div><div><h1>Taxonomy</h1><p>v2</p></div></div>
      <nav class="links"><a href="./">Docs home</a><a href="../zh/taxonomy.html">中文</a></nav>
    </header>
    <article class="doc">
      <h1>Category taxonomy</h1>
      <p>Source of truth: <code>taxonomy/categories.json</code>.</p>
      <h2>Extension policy</h2>
      <ul>
        <li><strong>Level-2</strong>: PR into <code>children</code>.</li>
        <li><strong>Level-1</strong>: open a Category extension Issue first.</li>
        <li><strong>Unknown</strong>: use <code>other/uncategorized</code>.</li>
      </ul>
      <pre>data/{category_slug}/{manufacturer_id}.json</pre>
      <p id="live">Loading…</p>
      <div id="tree"></div>
    </article>
  </div>
  <script>
    async function loadTax() {
      const urls = ["../assets/taxonomy.json", "https://raw.githubusercontent.com/zhanhuiinhk/world-electronic-components/main/taxonomy/categories.json"];
      for (const u of urls) {
        try { const r = await fetch(u); if (r.ok) return await r.json(); } catch(e) {}
      }
      return null;
    }
    loadTax().then(tax => {
      if (!tax) { document.getElementById("live").textContent = "Failed to load"; return; }
      document.getElementById("live").textContent = "version " + (tax.version || "") + " · " + (tax.categories||[]).length + " top-level categories";
      document.getElementById("tree").innerHTML = (tax.categories||[]).map(c =>
        `<h3>${c.slug} — ${c.name_en}</h3><ul>` +
        (c.children||[]).map(ch => `<li><code>${ch.slug}</code> ${ch.name_en}</li>`).join("") +
        `</ul>`
      ).join("");
    });
  </script>
</body>
</html>
